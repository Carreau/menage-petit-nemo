name = "menage-petit-nemo"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Static assets served from ./public (index.html, admin.html, app.js, ...)
[assets]
directory = "./public"
binding = "ASSETS"

# D1 database binding.
# Create the database once with:  npm run db:create
# then copy the returned database_id below and run:  npm run db:migrate
[[d1_databases]]
binding = "menage_petit_nemo"
database_name = "menage-petit-nemo"
database_id = "39f54a12-59e6-4f0c-8d42-444a9601de26"

# Secrets (set via `wrangler secret put <NAME>`):
#   FAMILY_PASSWORD  - shared password handed out to parents
#   ADMIN_PASSWORD   - password for the /admin panel
#   COOKIE_SECRET    - random 32+ character string used to sign cookies
